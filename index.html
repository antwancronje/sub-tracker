<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sub Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💳</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#e0e0e0;font-family:'Inter',sans-serif;font-weight:400;min-height:100vh;font-size:16px;-webkit-text-size-adjust:100%}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#login-screen h1{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:4px;margin-bottom:40px;color:#fff}
#login-screen input{width:320px;padding:16px 18px;margin-bottom:16px;background:#0F181E;border:1px solid #1a2a35;border-radius:10px;color:#e0e0e0;font-size:17px;font-family:'Inter',sans-serif;outline:none}
#login-screen input:focus{border-color:#2a4a5a}
#login-screen button{width:320px;padding:16px;background:#1a2a35;border:none;border-radius:10px;color:#fff;font-size:17px;font-weight:500;cursor:pointer;margin-top:8px}
#login-screen button:hover{background:#2a4a5a}
#login-error{color:#ff6b6b;margin-top:12px;font-size:15px}
#app{display:none;max-width:700px;margin:0 auto;padding:20px 16px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:16px;border-bottom:1px solid #1a1a1a}
header h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:#fff}
#btn-logout{background:none;border:1px solid #333;color:#bbb;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px}
#btn-logout:hover{border-color:#555;color:#fff}

/* TABS */
.tab-bar{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #1a1a1a}
.tab-btn{flex:1;padding:14px 0;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:#666;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s}
.tab-btn:hover{color:#bbb}
.tab-btn.active{color:#fff;border-bottom-color:#3b82f6}
.tab-content{display:none}
.tab-content.active{display:block}

/* SUB STYLES */
#totals-row{display:flex;justify-content:center;gap:24px;margin-bottom:20px;padding:10px 0}
.total-inline{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#fff;letter-spacing:1px}
.total-inline .label{font-family:'Inter',sans-serif;font-size:12px;font-weight:400;color:#999;text-transform:uppercase;letter-spacing:2px;margin-right:6px}
#status-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.status-card{border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all 0.15s}
.status-card:hover{transform:scale(1.02)}
.status-card .count{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:#fff;line-height:1}
.status-card .status-label{font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:2px;margin-top:6px}
.status-overdue{background:#2a1010}
.status-overdue .status-label{color:#ff6b6b}
.status-soon{background:#2a2010}
.status-soon .status-label{color:#ffa94d}
#status-detail{display:none;margin-bottom:20px;background:#0F181E;border-radius:12px;padding:16px}
#status-detail.show{display:block}
#status-detail-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;margin-bottom:12px;color:#fff}
.status-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1a2a35}
.status-item:last-child{border-bottom:none}
.status-item-name{color:#fff;font-size:16px;font-weight:500}
.status-item-info{text-align:right}
.status-item-amount{color:#fff;font-size:16px;font-weight:500}
.status-item-days{font-size:13px;margin-top:2px}
.status-item-days.overdue{color:#ff6b6b}
.status-item-days.soon{color:#ffa94d}
#category-filter{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.cat-btn{padding:8px 16px;border-radius:20px;border:1px solid #1a2a35;background:none;color:#bbb;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s}
.cat-btn:hover{border-color:#2a4a5a;color:#fff}
.cat-btn.active{background:#1a2a35;color:#fff;border-color:#2a4a5a}
.btn-add-row{width:100%;padding:18px;background:#0F181E;border:2px dashed #1a2a35;border-radius:12px;color:#999;font-size:17px;cursor:pointer;margin-bottom:24px;transition:all 0.2s}
.btn-add-row:hover{border-color:#2a4a5a;color:#fff}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;color:#ff6b6b;margin:24px 0 14px 0;padding-bottom:8px;border-bottom:1px solid #1a1a1a}
.section-title.upcoming{color:#ffa94d}
.section-title.active{color:#69db7c}
.section-title.bills{color:#74c0fc}
.sub-card{background:#0F181E;border-radius:12px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;cursor:pointer;transition:background 0.15s;gap:14px}
.sub-card:hover{background:#142028}
.sub-icon{width:42px;height:42px;border-radius:10px;background:#1a2a35;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.sub-icon img{width:28px;height:28px;object-fit:contain}
.sub-icon .fallback{font-size:18px;font-weight:600;color:#7a9aaa}
.sub-left{flex:1;min-width:0}
.sub-name{font-weight:500;color:#fff;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub-detail{font-size:14px;color:#999;margin-top:4px}
.sub-days{font-size:13px;margin-top:3px;font-weight:500}
.sub-days.overdue{color:#ff6b6b}
.sub-days.soon{color:#ffa94d}
.sub-days.ok{color:#888}
.sub-right{text-align:right;flex-shrink:0}
.sub-amount{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#fff}
.sub-cycle{font-size:13px;color:#999}
.sub-unknown{color:#888;font-size:16px}
.sub-category{font-size:12px;color:#7a9aaa;margin-top:3px}

/* TASK STYLES */
.task-stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.task-stat{background:#0F181E;border:1px solid #1a2a35;border-radius:8px;padding:10px 16px;font-size:13px;display:flex;align-items:center;gap:8px}
.task-stat .tcount{font-weight:600;font-size:18px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px}
.task-stat.overdue{border-color:#dc2626}
.task-stat.overdue .tcount{color:#dc2626}
.task-filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tf-btn{background:#0F181E;border:1px solid #1a2a35;color:#bbb;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s}
.tf-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
.tf-btn:hover{border-color:#2a4a5a}
.task-group{margin-bottom:24px}
.task-group-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#888;margin-bottom:10px;padding-left:4px;letter-spacing:1px}
.task-group-title .gcount{font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:400;opacity:0.6}
.task-card{background:#0F181E;border:1px solid #1a2a35;border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:border-color 0.15s}
.task-card:hover{border-color:#3b82f6}
.task-card.done{opacity:0.5}
.task-card.done .task-title{text-decoration:line-through}
.task-check{width:22px;height:22px;min-width:22px;border:2px solid #1a2a35;border-radius:50%;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.task-check:hover{border-color:#3b82f6;background:rgba(59,130,246,0.1)}
.task-check.checked{background:#3b82f6;border-color:#3b82f6}
.task-check.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:600}
.task-content{flex:1;min-width:0}
.task-title{font-size:15px;font-weight:500;margin-bottom:4px}
.task-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.task-date{font-size:12px;color:#888}
.task-date.overdue{color:#dc2626;font-weight:500}
.task-notes-preview{font-size:12px;color:#888;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.priority-dot{width:8px;height:8px;min-width:8px;border-radius:50%}
.priority-dot.high{background:#ef4444}
.priority-dot.medium{background:#f59e0b}
.priority-dot.low{background:#22c55e}
.done-toggle{background:#0F181E;border:1px solid #1a2a35;border-radius:8px;padding:12px 16px;margin-bottom:24px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:14px;color:#888;font-family:'Inter',sans-serif}
.done-toggle:hover{border-color:#2a4a5a}
.done-toggle .arrow{transition:transform 0.2s}
.done-toggle .arrow.open{transform:rotate(180deg)}

/* MODALS */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:#0F181E;border-radius:16px;padding:30px 24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal-box h2{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;color:#fff;margin-bottom:24px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:#999;margin-bottom:8px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:14px 16px;background:#080808;border:1px solid #1a2a35;border-radius:10px;color:#e0e0e0;font-size:17px;font-family:'Inter',sans-serif;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#2a4a5a}
.form-group textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-btn-save{width:100%;padding:16px;background:#1a2a35;border:none;border-radius:10px;color:#fff;font-size:17px;font-weight:500;cursor:pointer;margin-top:10px}
.modal-btn-save:hover{background:#2a4a5a}
.modal-btn-delete{width:100%;padding:14px;background:none;border:1px solid #3a1a1a;border-radius:10px;color:#ff6b6b;font-size:15px;cursor:pointer;margin-top:12px}
.modal-btn-delete:hover{background:#2a1010}
.modal-btn-cancel{width:100%;padding:14px;background:none;border:none;color:#999;font-size:15px;cursor:pointer;margin-top:10px}
.empty-state{text-align:center;padding:60px 20px;color:#666;font-size:17px}
@media(max-width:500px){body{font-size:17px}.modal-box{padding:24px 18px}header h1{font-size:1.8rem}.sub-name{font-size:16px}.sub-amount{font-size:1.5rem}.status-card .count{font-size:2.4rem}}

.task-card.done-show{opacity:0.5;max-height:200px;padding:14px 16px;margin-bottom:8px;border:1px solid #1a2a35;border-left:3px solid transparent;pointer-events:auto}

<div id="login-screen">
<h1>SUB TRACKER</h1>
<input type="email" id="login-email" placeholder="Email">
<input type="password" id="login-password" placeholder="Password">
<button onclick="doLogin()">Sign In</button>
<div id="login-error"></div>
</div>

<div id="app">
<header>
<h1 id="app-title">SUB TRACKER</h1>
<button id="btn-logout" onclick="doLogout()">Sign Out</button>
</header>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="subs" onclick="switchTab('subs',this)">Subscriptions</button>
    <button class="tab-btn" data-tab="tasks" onclick="switchTab('tasks',this)">Tasks</button>
  </div>

  <div class="tab-content active" id="tab-subs">

<div class="tab-bar">
<button class="tab-btn active" data-tab="subs" onclick="switchTab('subs',this)">Subscriptions</button>
<button class="tab-btn" data-tab="tasks" onclick="switchTab('tasks',this)">Tasks</button>
</div>

<!-- SUBSCRIPTIONS TAB -->
<div class="tab-content active" id="tab-subs">
<div id="totals-row">
<div class="total-inline"><span class="label">ZAR</span> <span id="total-zar">R0</span></div>
<div class="total-inline"><span class="label">USD</span> <span id="total-usd">$0</span></div>
</div>
<div id="status-cards">
<div class="status-card status-overdue" onclick="toggleStatusDetail('overdue')">
<div class="count" id="overdue-count">0</div>
<div class="status-label">Overdue</div>
</div>
<div class="status-card status-soon" onclick="toggleStatusDetail('soon')">
<div class="count" id="soon-count">0</div>
<div class="status-label">Due This Week</div>
</div>
</div>
<div id="status-detail">
<div id="status-detail-title"></div>
<div id="status-detail-list"></div>
</div>
<div id="category-filter"></div>
<button class="btn-add-row" onclick="openSubModal()">+ Add Subscription</button>
<div id="sub-list"></div>
</div>

<!-- TASKS TAB -->
<div class="tab-content" id="tab-tasks">
<div class="task-stats" id="task-stats"></div>
<div class="task-filters" id="task-filters">
<button class="tf-btn active" onclick="setTaskFilter('all',this)">All</button>
<button class="tf-btn" onclick="setTaskFilter('high',this)">High</button>
<button class="tf-btn" onclick="setTaskFilter('medium',this)">Medium</button>
<button class="tf-btn" onclick="setTaskFilter('low',this)">Low</button>
</div>
<button class="btn-add-row" onclick="openTaskModal()">+ Add Task</button>
<div id="task-container"></div>
</div>
</div>

<!-- SUB MODAL -->
<div class="modal-overlay" id="sub-modal" onclick="closeSubModalOutside(event)">
<div class="modal-box">
<h2 id="sub-modal-title">ADD SUBSCRIPTION</h2>
<div class="form-group"><label>Name</label><input type="text" id="f-name" placeholder="e.g. Netflix"></div>
<div class="form-row">
<div class="form-group"><label>Amount</label><input type="number" id="f-amount" placeholder="0.00" step="0.01"></div>
<div class="form-group"><label>Currency</label><select id="f-currency"><option value="ZAR">ZAR (R)</option><option value="USD">USD ($)</option></select></div>
</div>
<div class="form-row">
<div class="form-group"><label>Cycle</label><select id="f-cycle"><option value="monthly">Monthly</option><option value="yearly">Yearly</option><option value="once-off">Once-off</option><option value="as-needed">As needed</option></select></div>
<div class="form-group"><label>Type</label><select id="f-type"><option value="subscription">Subscription</option><option value="bill">Bill</option></select></div>
</div>
<div class="form-group"><label>Category</label><select id="f-category"><option value="">None</option><option value="Software">Software</option><option value="Entertainment">Entertainment</option><option value="Hosting">Hosting</option><option value="Internet">Internet</option><option value="Apps">Apps</option><option value="Bills">Bills</option><option value="Church">Church</option><option value="AI">AI</option><option value="Domains">Domains</option><option value="Other">Other</option></select></div>
<div class="form-row">
<div class="form-group"><label>Next Renewal</label><input type="date" id="f-renewal"></div>
<div class="form-group"><label>Last Payment</label><input type="date" id="f-lastpay"></div>
</div>
<div class="form-group"><label>Notes</label><input type="text" id="f-notes" placeholder="Optional notes"></div>
<button class="modal-btn-save" onclick="saveSub()">Save</button>
<button class="modal-btn-delete" id="sub-btn-delete" onclick="deleteSub()" style="display:none">Delete</button>
<button class="modal-btn-cancel" onclick="closeSubModal()">Cancel</button>
</div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="task-modal" onclick="closeTaskModalOutside(event)">
<div class="modal-box">
<h2 id="task-modal-title">ADD TASK</h2>
<div class="form-group"><label>Title</label><input type="text" id="t-title" placeholder="What needs to be done?"></div>
<div class="form-row">
<div class="form-group"><label>Due Date</label><input type="date" id="t-due"></div>
<div class="form-group"><label>Priority</label><select id="t-priority"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></div>
</div>
<div class="form-group"><label>Notes</label><textarea id="t-notes" placeholder="Optional notes..."></textarea></div>
<button class="modal-btn-save" onclick="saveTask()">Save</button>
<button class="modal-btn-delete" id="task-btn-delete" onclick="deleteTask()" style="display:none">Delete</button>
<button class="modal-btn-cancel" onclick="closeTaskModal()">Cancel</button>
</div>
</div>

function renderSubs(){

let overdue=[],thisWeek=[],upcoming=[],active=[],bills=[];
filtered.forEach(s=>{const r=s.next_renewal?new Date(s.next_renewal+'T00:00:00'):null;if(s.type==='bill'){if(r&&r<today)overdue.push(s);else bills.push(s)}else if(r&&r<today)overdue.push(s);else if(r&&r<=in7)thisWeek.push(s);else if(r&&r<=in14)upcoming.push(s);else active.push(s)});

return`<div class="sub-card" onclick="openSubEdit('${s.id}')"><div class="sub-icon">${iconHtml}</div><div class="sub-left"><div class="sub-name">${s.name}</div><div class="sub-days ${dl.cls}">${dl.text}</div>${catHtml}</div><div class="sub-right">${amt?`<div class="sub-amount">${amt}</div><div class="sub-cycle">${cyc}</div>`:'<div class="sub-unknown">—</div>'}</div></div>`;
}
function updateTotals(){
let zar=0,usd=0;subs.forEach(s=>{if(!s.amount)return;const amt=parseFloat(s.amount);const monthly=s.cycle==='yearly'?amt/12:s.cycle==='monthly'?amt:0;if(s.currency==='ZAR')zar+=monthly;else if(s.currency==='USD')usd+=monthly});

// TASK RENDER
function renderTasks(){
const container=document.getElementById('task-container');
const today=new Date();today.setHours(0,0,0,0);
const todayStr=fmtISO(today);
const weekEnd=new Date(today);weekEnd.setDate(weekEnd.getDate()+7);
const weekEndStr=fmtISO(weekEnd);
let filtered=tasks;
if(taskFilter!=='all')filtered=filtered.filter(t=>t.priority===taskFilter);
const openTasks=filtered.filter(t=>t.status==='open');
const doneTasks=filtered.filter(t=>t.status==='done');
const overdue=openTasks.filter(t=>t.due_date&&t.due_date<todayStr);
const dueToday=openTasks.filter(t=>t.due_date===todayStr);
const dueThisWeek=openTasks.filter(t=>t.due_date&&t.due_date>todayStr&&t.due_date<=weekEndStr);
const upcoming=openTasks.filter(t=>t.due_date&&t.due_date>weekEndStr);
const noDate=openTasks.filter(t=>!t.due_date);
const priOrd={high:0,medium:1,low:2};
const srt=(a,b)=>{if(a.due_date&&b.due_date)return a.due_date.localeCompare(b.due_date);if(a.due_date)return -1;if(b.due_date)return 1;return priOrd[a.priority]-priOrd[b.priority]};
[overdue,dueToday,dueThisWeek,upcoming,noDate].forEach(g=>g.sort(srt));
const allOpen=tasks.filter(t=>t.status==='open');
const allOverdue=allOpen.filter(t=>t.due_date&&t.due_date<todayStr);
document.getElementById('task-stats').innerHTML=`<div class="task-stat"><span class="tcount">${allOpen.length}</span> Open</div>${allOverdue.length>0?`<div class="task-stat overdue"><span class="tcount">${allOverdue.length}</span> Overdue</div>`:''}<div class="task-stat"><span class="tcount">${tasks.filter(t=>t.status==='done').length}</span> Done</div>`;
let html='';
if(openTasks.length===0&&doneTasks.length===0){html='<div class="empty-state">No tasks yet. Tap + to add one.</div>';container.innerHTML=html;return}
if(overdue.length)html+=taskGroup('Overdue',overdue);
if(dueToday.length)html+=taskGroup('Due Today',dueToday);
if(dueThisWeek.length)html+=taskGroup('This Week',dueThisWeek);
if(upcoming.length)html+=taskGroup('Upcoming',upcoming);
if(noDate.length)html+=taskGroup('No Due Date',noDate);
if(openTasks.length===0&&doneTasks.length>0)html+='<div class="empty-state">All done! No open tasks.</div>';
if(doneTasks.length>0){
html+=`<div class="done-toggle" onclick="toggleDone()"><span>Completed (${doneTasks.length})</span><span class="arrow ${showDone?'open':''}">▼</span></div>`;
if(showDone){html+='<div class="task-group">';doneTasks.sort((a,b)=>(b.completed_at||'').localeCompare(a.completed_at||''));doneTasks.forEach(t=>{html+=taskCard(t)});html+='</div>'}
}
container.innerHTML=html;
}
function taskGroup(title,items){
let html=`<div class="task-group"><div class="task-group-title">${title} <span class="gcount">(${items.length})</span></div>`;
items.forEach(t=>{html+=taskCard(t)});html+='</div>';return html;
}
function taskCard(task){
const isDone=task.status==='done';
const dateStr=task.due_date?fmtDisplay(task.due_date):'';
const today=new Date();today.setHours(0,0,0,0);
const odClass=(task.due_date&&task.due_date<fmtISO(today)&&!isDone)?' overdue':'';
return`<div class="task-card ${isDone?'done':''}" onclick="openTaskEdit('${task.id}')"><div class="task-check ${isDone?'checked':''}" onclick="event.stopPropagation();toggleTaskStatus('${task.id}')"></div><div class="task-content"><div class="task-title">${esc(task.title)}</div><div class="task-meta"><div class="priority-dot ${task.priority}"></div>${dateStr?`<span class="task-date${odClass}">${dateStr}</span>`:''}</div>${task.notes?`<div class="task-notes-preview">${esc(task.notes)}</div>`:''}</div></div>`;
}

// HELPERS
function fmtISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtDisplay(dateStr){
const d=new Date(dateStr+'T00:00:00');const today=new Date();today.setHours(0,0,0,0);
const diff=Math.round((d-today)/86400000);
if(diff===0)return'Today';if(diff===1)return'Tomorrow';if(diff===-1)return'Yesterday';
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
return`${d.getDate()} ${months[d.getMonth()]}`;
}
function esc(str){const div=document.createElement('div');div.textContent=str;return div.innerHTML}

  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('app-title').textContent=tab==='subs'?'SUB TRACKER':'TASK TRACKER';
}

// TASK DATA
var tasks=[];
var editingTaskId=null;
var taskFilter='all';
var showDone=false;

async function loadTasks(){
  var r=await sb.from('tasks').select('*').order('created_at',{ascending:false});
  if(r.error){console.error(r.error);return}
  tasks=r.data||[];
  renderTasks();
}

function tfmtISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

function tfmtDisplay(ds){
  var d=new Date(ds+'T00:00:00');
  var today=new Date();today.setHours(0,0,0,0);
  var diff=Math.round((d-today)/86400000);
  if(diff===0)return 'Today';
  if(diff===1)return 'Tomorrow';
  if(diff===-1)return 'Yesterday';
  var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate()+' '+m[d.getMonth()];
}

function tesc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function renderTasks(){
  var container=document.getElementById('task-container');
  var today=new Date();today.setHours(0,0,0,0);
  var todayStr=tfmtISO(today);
  var we=new Date(today);we.setDate(we.getDate()+7);
  var weekStr=tfmtISO(we);
  var filtered=tasks;
  if(taskFilter!=='all')filtered=filtered.filter(function(t){return t.priority===taskFilter});
  var openT=filtered.filter(function(t){return t.status==='open'});
  var doneT=filtered.filter(function(t){return t.status==='done'});
  var overdue=openT.filter(function(t){return t.due_date&&t.due_date<todayStr});
  var dueToday=openT.filter(function(t){return t.due_date===todayStr});
  var dueWeek=openT.filter(function(t){return t.due_date&&t.due_date>todayStr&&t.due_date<=weekStr});
  var upcoming=openT.filter(function(t){return t.due_date&&t.due_date>weekStr});
  var noDate=openT.filter(function(t){return !t.due_date});
  var po={high:0,medium:1,low:2};
  var sf=function(a,b){if(a.due_date&&b.due_date)return a.due_date.localeCompare(b.due_date);if(a.due_date)return -1;if(b.due_date)return 1;return po[a.priority]-po[b.priority]};
  [overdue,dueToday,dueWeek,upcoming,noDate].forEach(function(g){g.sort(sf)});
  var allOpen=tasks.filter(function(t){return t.status==='open'});
  var allOD=allOpen.filter(function(t){return t.due_date&&t.due_date<todayStr});
  var allDone=tasks.filter(function(t){return t.status==='done'});
  document.getElementById('task-stats').innerHTML='<div class="task-stat"><span class="tcount">'+allOpen.length+'</span> Open</div>'+(allOD.length>0?'<div class="task-stat overdue"><span class="tcount">'+allOD.length+'</span> Overdue</div>':'')+'<div class="task-stat"><span class="tcount">'+allDone.length+'</span> Done</div>';
  var html='';
  if(openT.length===0&&doneT.length===0){
    container.innerHTML='<div class="empty-tasks"><h3>All Clear</h3><p>Enjoy your day, Sir.</p></div>';
    return;
  }
  if(overdue.length)html+=tGroup('Overdue',overdue,true);
  if(dueToday.length)html+=tGroup('Due Today',dueToday,false);
  if(dueWeek.length)html+=tGroup('This Week',dueWeek,false);
  if(upcoming.length)html+=tGroup('Upcoming',upcoming,false);
  if(noDate.length)html+=tGroup('No Due Date',noDate,false);
  if(openT.length===0&&doneT.length>0)html+='<div class="empty-tasks"><h3>All Done</h3><p>Nothing open. Nice work.</p></div>';
  if(doneT.length>0){
    html+='<div class="done-toggle" onclick="toggleDone()"><span>Completed ('+doneT.length+')</span><span class="arrow '+(showDone?'open':'')+'">\u25BC</span></div>';
    if(showDone){
      html+='<div class="task-group">';
      doneT.sort(function(a,b){return (b.completed_at||'').localeCompare(a.completed_at||'')});
      doneT.forEach(function(t){html+=tCard(t,false,true)});
      html+='</div>';
    }
  }
  container.innerHTML=html;
}

function tGroup(title,items,isOverdue){
  var h='<div class="task-group"><div class="task-group-title">'+title+' <span class="gcount">('+items.length+')</span></div>';
  items.forEach(function(t){h+=tCard(t,isOverdue,false)});
  h+='</div>';
  return h;
}

function tCard(task,isOverdue,isDoneSection){
  var isDone=task.status==='done';
  var ds=task.due_date?tfmtDisplay(task.due_date):'';
  var today=new Date();today.setHours(0,0,0,0);
  var isOD=task.due_date&&task.due_date<tfmtISO(today)&&!isDone;
  var cardClass='task-card';
  if(isDone&&isDoneSection)cardClass+=' done-show';
  else if(isDone)cardClass+=' done';
  if(isOD||isOverdue)cardClass+=' overdue-card';
  var odcls=isOD?' overdue':'';
  var tt=tesc(task.title);
  var tn=task.notes?tesc(task.notes):'';
  return '<div class="'+cardClass+'" onclick="openTaskEdit(''+task.id+'')"><div class="task-check '+(isDone?'checked':'')+'" onclick="event.stopPropagation();toggleTaskDone(''+task.id+'')"></div><div class="task-content"><div class="task-title">'+tt+'</div><div class="task-meta"><div class="priority-dot '+task.priority+'"></div>'+(ds?'<span class="task-date'+odcls+'">'+ds+'</span>':'')+'</div>'+(tn?'<div class="task-notes-preview">'+tn+'</div>':'')+'</div></div>';
}

// TASK ACTIONS
async function toggleTaskDone(id){
  var task=tasks.find(function(t){return t.id===id});
  if(!task)return;
  var ns=task.status==='open'?'done':'open';
  var upd={status:ns};
  if(ns==='done')upd.completed_at=new Date().toISOString();
  else upd.completed_at=null;
  // Animate first
  task.status=ns;
  task.completed_at=upd.completed_at;
  renderTasks();
  // Then save
  var r=await sb.from('tasks').update(upd).eq('id',id);
  if(r.error){console.error(r.error);task.status=ns==='done'?'open':'done';renderTasks()}
}

function setTaskFilter(f,btn){
  taskFilter=f;
  document.querySelectorAll('.tf-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  renderTasks();
}

function toggleDone(){showDone=!showDone;renderTasks()}

// TASK MODAL
function openTaskModal(){
  editingTaskId=null;
  document.getElementById('task-modal-title').textContent='ADD TASK';
  document.getElementById('t-title').value='';
  document.getElementById('t-due').value='';
  document.getElementById('t-priority').value='medium';
  document.getElementById('t-notes').value='';
  document.getElementById('task-btn-delete').style.display='none';
  document.getElementById('task-modal-overlay').style.display='flex';
}

function openTaskEdit(id){
  var t=tasks.find(function(x){return x.id===id});
  if(!t)return;
  editingTaskId=id;
  document.getElementById('task-modal-title').textContent='EDIT TASK';
  document.getElementById('t-title').value=t.title;
  document.getElementById('t-due').value=t.due_date||'';
  document.getElementById('t-priority').value=t.priority;
  document.getElementById('t-notes').value=t.notes||'';
  document.getElementById('task-btn-delete').style.display='block';
  document.getElementById('task-modal-overlay').style.display='flex';
}

function closeTaskModal(){
  document.getElementById('task-modal-overlay').style.display='none';
  editingTaskId=null;
}

async function saveTask(){
  var title=document.getElementById('t-title').value.trim();
  if(!title)return;
  var due_date=document.getElementById('t-due').value||null;
  var priority=document.getElementById('t-priority').value;
  var notes=document.getElementById('t-notes').value.trim()||null;
  if(editingTaskId){
    var r=await sb.from('tasks').update({title:title,due_date:due_date,priority:priority,notes:notes}).eq('id',editingTaskId);
    if(r.error){console.error(r.error);return}
  }else{
    var r=await sb.from('tasks').insert([{title:title,due_date:due_date,priority:priority,notes:notes}]);
    if(r.error){console.error(r.error);return}
  }
  closeTaskModal();
  await loadTasks();
}

async function deleteTask(){
  if(!editingTaskId)return;
  if(!confirm('Delete this task?'))return;
  var r=await sb.from('tasks').delete().eq('id',editingTaskId);
  if(r.error){console.error(r.error);return}
  closeTaskModal();
  await loadTasks();
}


// INIT
checkSession();
</script>
</body>
</html>
